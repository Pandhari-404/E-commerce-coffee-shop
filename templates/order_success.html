{% extends 'base.html' %}
{% block body %}



<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 text-center p-4" style="max-width: 420px;">

    <!-- Success Icon -->
    <div class="mb-3">
      <div class="rounded-circle bg-success bg-opacity-10 d-inline-flex p-3">
        <i class="bi bi-check-circle-fill text-success fs-1"></i>
      </div>
    </div>

    <h4 class="fw-bold">Order Placed Successfully!</h4>

    <p class="text-muted small mt-2">
      Thank you for your order. Your order ID is
      <strong>#{{ order_id }}</strong>
      <br>
      A confirmation email has been sent to
      <strong>{{ email }}</strong>
    </p>

    <div class="d-flex justify-content-center gap-2 mt-3">
      <a href="{% url 'home' %}" class="btn btn-danger">
        🏠 Back to Home
      </a>
      <a href="{% url 'mycart' %}" class="btn btn-warning text-white">
        🛍 Continue Shopping
      </a>
    </div>

  </div>
</div>


{% endblock body %}
